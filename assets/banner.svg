<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#14304C" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" fill="#0A1628"/>
  <rect width="1200" height="260" fill="url(#grid)"/>

  <rect x="-4" y="0" width="4" height="260" fill="#4CD9E8" opacity="0.22">
    <animate attributeName="x" values="-4;1204;-4" dur="7s" repeatCount="indefinite"/>
  </rect>

  <circle cx="1140" cy="34" r="5" fill="#4CD9E8">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="1122" y="39" fill="#4CD9E8" font-family="Consolas, monospace" font-size="12" text-anchor="end">SYSTEM ONLINE</text>

  <text x="60" y="108" font-family="Consolas, monospace" font-size="42" font-weight="700" fill="#E8EEF5" opacity="0">
    AKHILESHWAR PRATAP SINGH
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.8s" fill="freeze"/>
  </text>
  <rect x="62" y="120" width="0" height="3" fill="#F5A623">
    <animate attributeName="width" from="0" to="600" begin="0.1s" dur="0.8s" fill="freeze"/>
  </rect>

  <text x="62" y="155" font-family="Consolas, monospace" font-size="18" fill="#4CD9E8" opacity="0">
    robotics engineer — autonomous systems / embedded firmware / robot learning
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.9s" fill="freeze"/>
  </text>

  <text x="62" y="183" font-family="Consolas, monospace" font-size="13" fill="#7C93AC" opacity="0">
    secretary, robotics &amp; automation society — ieee rgipt
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.9s" fill="freeze"/>
  </text>

  <text x="62" y="215" font-family="Consolas, monospace" font-size="13" fill="#3A5068" opacity="0">
    &gt; ./init_akhileshwar.sh --status<tspan fill="#4CD9E8"> READY</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.9s" fill="freeze"/>
  </text>

  <line x1="990" y1="226" x2="990" y2="210" stroke="#3A5068" stroke-width="4"/>
  <rect x="955" y="222" width="70" height="10" rx="2" fill="none" stroke="#F5A623" stroke-width="2"/>

  <g transform="translate(990,210)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-15;12;-15" dur="4s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-72" stroke="#F5A623" stroke-width="6" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="8" fill="#0A1628" stroke="#F5A623" stroke-width="3"/>
      <g transform="translate(0,-72)">
        <g>
          <animateTransform attributeName="transform" type="rotate" values="22;-28;22" dur="3.2s" repeatCount="indefinite"/>
          <line x1="0" y1="0" x2="46" y2="-42" stroke="#4CD9E8" stroke-width="5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="6" fill="#0A1628" stroke="#4CD9E8" stroke-width="2"/>
          <g transform="translate(46,-42)">
            <circle r="7" fill="#F5A623"/>
            <circle r="14" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.5">
              <animate attributeName="r" values="7;20;7" dur="3.2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.6;0;0.6" dur="3.2s" repeatCount="indefinite"/>
            </circle>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
